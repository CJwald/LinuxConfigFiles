
unbind r
bind r source-file $HOME/.tmux.conf
# Set the outer terminal assumption (what tmux tells new sessions/windows)
set -g default-terminal "screen-256color"


set -g prefix `

set -g mouse off

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Vim style copying
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Tokyonight Moon theme colors
#thm_bg="#222436"
#thm_fg="#c8d3f5"
#thm_cyan="#86e1fc"
#thm_black="#1b1d2b"
#thm_gray="#3a3f5a"
#thm_magenta="#c099ff"
#thm_pink="#ff757f"
#thm_red="#ff757f"
#thm_green="#c3e88d"
#thm_yellow="#ffc777"
#thm_blue="#82aaff"
#thm_orange="#ff9e64"
#thm_black4="#444a73"

thm_bg="#303030"
thm_fg="#b1d404"
thm_tred="#ff0f00"
thm_red="#a8201b"
thm_purp="#7d69bf"
thm_black="#010101"

# Status bar
set -g status "on"
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# Messages
#set -g message-style "fg=${thm_cyan},bg=${thm_gray},align=centre"
#set -g message-command-style "fg=${thm_cyan},bg=${thm_gray},align=centre"

# Panes
set -g pane-border-style "fg=${thm_bg}"
set -g pane-active-border-style "fg=${thm_tred}"

# Windows
set -g window-status-activity-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-separator ""
set -g window-status-style "fg=${thm_fg},bg=${thm_bg},none"

# Statusline - current window
set -g window-status-current-format "#[fg=${thm_tred},bg=${thm_bg}] #I: #[fg=${thm_tred},bg=${thm_bg}][🕱] #[fg=${thm_red},bg=${thm_bg}]#W - #(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) #[fg=${thm_tred},bg=${thm_bg}]"

# Statusline - other windows
set -g window-status-format "#[fg=${thm_fg},bg=${thm_bg}] #I: #[fg=${thm_fg},bg=${thm_bg}][ ] #W"

# Statusline - right side
set -g status-right "#[fg=${thm_fg},bg=${thm_bg},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_fg},nobold,nounderscore,noitalics] #[fg=${thm_bg},bg=${thm_fg}] #W #{?client_prefix,#[fg=${thm_red}],#[fg=${thm_red}]}#[bg=${thm_fg}]#{?client_prefix,#[bg=${thm_red}],#[bg=${thm_red}]}#[fg=${thm_bg}] #[fg=${thm_bg},bg=${thm_red}] #S "

# Statusline - left side (empty)
set -g status-left ""

# Modes
set -g clock-mode-colour "${thm_fg}"
set -g mode-style "fg=${thm_purp} bg=${thm_black} bold"




